<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario World | Arcade</title>
    <style>
        /* This makes the background black and centers the game perfectly */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000; /* Pure black background */
            overflow: hidden; /* No scrollbars */
        }

        /* Styling the game box */
        .game-wrapper {
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
            border: 2px solid #333;
            line-height: 0;
        }

        iframe {
            width: 800px;
            height: 600px;
            border: none;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <iframe 
            src="https://classicjoy.games/embed?slug=super-mario-world" 
            allowfullscreen 
            sandbox="allow-scripts allow-same-origin allow-pointer-lock"
            title="Super Mario World">
        </iframe>
    </div>

</body>
</html>
