<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario World | My Arcade</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        #game { width: 800px; height: 600px; }
    </style>
</head>
<body>

    <div id="game"></div>

    <script>
        // This connects to a clean, ad-free emulator
        EJS_player = '#game';
        EJS_core = 'snes'; // Super Nintendo
        EJS_gameName = "Super Mario World";
        EJS_color = '#0064ff';
        EJS_startOnLoaded = true;
        
        // This is the link to a public, ad-free version of the game file
        EJS_gameUrl = 'https://cdn.statically.io/gh/Abishek-Santhosh/Mario-Games/main/Super%20Mario%20World%20(USA).sfc'; 
        
        EJS_pathtodata = 'https://www.emulatorjs.com/loader/';
    </script>
    <script src="https://www.emulatorjs.com/loader/loader.js"></script>

</body>
</html>
