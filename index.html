<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario World | Ad-Free</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
        }
        #game { width: 800px; height: 600px; }
    </style>
</head>
<body>

    <div id="game"></div>

    <script>
        // Configuration for the ad-free emulator
        EJS_player = '#game';
        EJS_core = 'snes'; 
        EJS_gameName = "Super Mario World";
        EJS_color = '#ff0000';
        EJS_startOnLoaded = true;
        
        // Corrected path to emulator data
        EJS_pathtodata = 'https://www.emulatorjs.com/loader/';
        
        // Link to the game file (ROM)
        EJS_gameUrl = 'https://cdn.statically.io/gh/Abishek-Santhosh/Mario-Games/main/Super%20Mario%20World%20(USA).sfc'; 
    </script>
    <script src="https://www.emulatorjs.com/loader/loader.js"></script>

</body>
</html>
